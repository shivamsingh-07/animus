apiVersion: apps/v1
kind: Deployment
metadata:
  name: animus-api
  labels:
    app: animus-api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: animus-api
  template:
    metadata:
      labels:
        app: animus-api
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      initContainers:
        - name: wait-for-db
          image: busybox:1.38
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: animus-config
          command:
            - sh
            - -c
            - until nc -z "$MYSQL_HOST" "$MYSQL_PORT"; do echo "waiting for db $MYSQL_HOST:$MYSQL_PORT"; sleep 2; done
      containers:
        - name: animus-api
          image: "{{ .Values.image.repository }}/animus-api:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: animus-config
            - secretRef:
                name: animus-secrets
          ports:
            - containerPort: 4000
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: animus-api-svc
  labels:
    app: animus-api
spec:
  selector:
    app: animus-api
  ports:
    - port: 4000
      targetPort: 4000
